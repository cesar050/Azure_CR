{% extends "./base.html" %}
{% block title %}
    Agregar Pasajero
{% endblock %}

{% block body %}
<center>
    <article>
        <p class="animate__animated animate__pulse animate__infinite"
        style="font-family: 'Comic Sans MS', sans-serif; font-size: 50px; ">SITU</p><br>
    </article>        
</center>
<h2>Agregar Pasajero</h2>
    <div class="card">
        <div class="card-body">
            <form action="" method="post" enctype="multipart/form-data">
                {% csrf_token %}
                {{form.as_p}}
                <hr>
                <div class="d-flex justify-content-center">
                    <a href="{% url 'pasajeros' %}" class="btn btn-secondary">Cancelar</a>
                    &nbsp;
                    <input type="submit" value="Guardar" class="btn btn-success">
                </div>
            </form>
        </div>
    </div>
{% endblock body %}
